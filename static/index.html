<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheat Variation Explorer</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'surface-0': '#0f1117',
            'surface-1': '#161b22',
            'surface-2': '#1c2333',
            'accent':    '#7c3aed',
            'accent-light': '#a78bfa',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          },
        },
      },
    };
  </script>

  <style>
    /* ── Base ─────────────────────────────────────────────── */
    * { box-sizing: border-box; }
    html, body { background-color: #0f1117; color: #e2e8f0; }

    /* ── Scrollbar ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 3px; }

    /* ── Animations ───────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes skeleton-wave {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    .fade-in  { animation: fadeIn  0.4s ease both; }
    .slide-up { animation: slideUp 0.45s ease both; }

    .skeleton-row {
      height: 2.5rem;
      border-radius: 4px;
      background: linear-gradient(90deg, #1c2333 25%, #253047 50%, #1c2333 75%);
      background-size: 800px 100%;
      animation: skeleton-wave 1.4s infinite linear;
    }

    /* ── Input focus ring ─────────────────────────────────── */
    .input-field:focus {
      outline: none;
      box-shadow: 0 0 0 2px #a78bfa;
    }

    /* ── Table ────────────────────────────────────────────── */
    .results-table thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #1c2333;
    }
    .results-table tbody tr:hover {
      background: #253047;
    }
    .cell-truncate {
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Badge ────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* ── Button ───────────────────────────────────────────── */
    .btn-primary {
      background: #7c3aed;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #6d28d9; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled {
      background: #3b2a6b;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .btn-outline {
      border: 1px solid #374151;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-outline:hover {
      border-color: #a78bfa;
      background: #1c2333;
    }

    /* ── Checkbox ─────────────────────────────────────────── */
    input[type="checkbox"] { accent-color: #7c3aed; cursor: pointer; }

    /* ── Sort arrows ──────────────────────────────────────── */
    .sort-icon { opacity: 0.4; user-select: none; }
    .sort-icon.active { opacity: 1; color: #a78bfa; }
  </style>
</head>

<body class="h-full font-sans antialiased" x-data="dashboardApp()">

  <!-- ═══════════════════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════════════════ -->
  <header class="border-b border-surface-2 bg-surface-1 fade-in">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- wheat icon -->
        <svg class="w-7 h-7 text-accent-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                d="M12 3v18M9 6c0 0-3 1-3 4s3 3 3 3M15 6c0 0 3 1 3 4s-3 3-3 3
                   M9 13c0 0-3 1-3 4s3 3 3 3M15 13c0 0 3 1 3 4s-3 3-3 3" />
        </svg>
        <div>
          <h1 class="text-lg font-semibold text-white leading-tight">
            Wheat Variation Explorer
          </h1>
          <p class="text-xs text-slate-400 mt-0.5">
            EBI Ensembl Plants — Variants &amp; KASP Markers
          </p>
        </div>
      </div>

      <!-- DB badge -->
      <div x-show="dbName" class="hidden sm:flex items-center gap-2 text-xs text-slate-400">
        <span class="w-2 h-2 rounded-full bg-emerald-400 inline-block"></span>
        <span x-text="dbName" class="font-mono"></span>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════════════════════ -->
  <main class="max-w-7xl mx-auto px-6 py-8 space-y-6">

    <!-- ── Query Panel ───────────────────────────────────────── -->
    <section class="bg-surface-1 border border-surface-2 rounded-xl p-6 fade-in">
      <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-widest mb-4">
        Search Parameters
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Variant ID -->
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">
            Variant ID
            <span class="ml-1 text-slate-600">(e.g. Cadenza1714)</span>
          </label>
          <input
            type="text"
            x-model="variantId"
            placeholder="SNP / variant name prefix…"
            @keydown.enter="submitQuery()"
            class="input-field w-full bg-surface-2 border border-slate-700 rounded-lg px-3 py-2.5
                   text-sm text-white placeholder-slate-600 transition"
          />
        </div>

        <!-- Transcript ID -->
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1.5">
            Transcript ID
            <span class="ml-1 text-slate-600">(e.g. TraesCS2A02G…)</span>
          </label>
          <input
            type="text"
            x-model="transcriptId"
            placeholder="Ensembl transcript ID prefix…"
            @keydown.enter="submitQuery()"
            class="input-field w-full bg-surface-2 border border-slate-700 rounded-lg px-3 py-2.5
                   text-sm text-white placeholder-slate-600 transition"
          />
        </div>

        <!-- Consequence Types (checkbox dropdown) -->
        <div class="relative" @click.away="consequenceDropdownOpen = false">
          <label class="block text-xs font-medium text-slate-400 mb-1.5">
            Consequence Types
            <span class="ml-1 text-slate-600">(optional filter)</span>
          </label>

          <!-- Trigger button -->
          <button
            type="button"
            @click="consequenceDropdownOpen = !consequenceDropdownOpen"
            class="input-field w-full bg-surface-2 border border-slate-700 rounded-lg px-3 py-2.5
                   text-sm text-white text-left flex items-center justify-between transition"
            :class="consequenceDropdownOpen ? 'border-accent-light ring-2 ring-[#a78bfa]' : ''"
          >
            <span x-text="consequenceLabel" class="truncate text-slate-300"></span>
            <svg class="w-4 h-4 text-slate-500 ml-2 flex-shrink-0 transition-transform duration-150"
                 :class="{ 'rotate-180': consequenceDropdownOpen }"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <!-- Dropdown panel -->
          <div
            x-show="consequenceDropdownOpen"
            x-transition:enter="transition ease-out duration-100"
            x-transition:enter-start="opacity-0 -translate-y-1"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-75"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 -translate-y-1"
            class="absolute z-50 mt-1 w-full bg-surface-2 border border-slate-700
                   rounded-lg shadow-2xl overflow-hidden"
          >
            <ul class="py-1 max-h-64 overflow-y-auto">
              <template x-for="ct in CONSEQUENCE_TYPES" :key="ct">
                <li>
                  <label class="flex items-center gap-3 px-3 py-2 hover:bg-surface-1 cursor-pointer">
                    <input
                      type="checkbox"
                      :value="ct"
                      x-model="selectedConsequenceTypes"
                      class="w-4 h-4 rounded border-slate-600 bg-surface-2 flex-shrink-0"
                    />
                    <span class="text-sm text-slate-300" x-text="ct.replace(/_/g, ' ')"></span>
                  </label>
                </li>
              </template>
            </ul>
            <div class="border-t border-slate-700 px-3 py-2 flex justify-between items-center">
              <span class="text-xs text-slate-500"
                    x-text="selectedConsequenceTypes.length + ' selected'"></span>
              <button
                type="button"
                @click="selectedConsequenceTypes = []"
                class="text-xs text-slate-500 hover:text-slate-300 transition"
              >Clear</button>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-4 flex items-center gap-3">
        <button
          @click="submitQuery()"
          :disabled="loading"
          class="btn-primary px-6 py-2.5 rounded-lg text-sm font-semibold text-white
                 focus:outline-none focus:ring-2 focus:ring-accent-light"
        >
          <span x-show="!loading">Search</span>
          <span x-show="loading" class="flex items-center gap-2">
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Querying…
          </span>
        </button>

        <button
          x-show="rows.length > 0 || error"
          @click="resetState()"
          class="btn-outline px-4 py-2.5 rounded-lg text-sm text-slate-400
                 focus:outline-none focus:ring-2 focus:ring-accent-light"
        >
          Clear
        </button>
      </div>
    </section>

    <!-- ── Error Banner ──────────────────────────────────────── -->
    <div
      x-show="error"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 -translate-y-1"
      x-transition:enter-end="opacity-100 translate-y-0"
      class="bg-red-950 border border-red-800 rounded-xl px-5 py-4 flex items-start gap-3"
    >
      <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v3m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      <p class="text-sm text-red-300" x-text="error"></p>
    </div>

    <!-- ── Loading Skeleton ──────────────────────────────────── -->
    <div x-show="loading" class="space-y-2 fade-in">
      <template x-for="i in 8" :key="i">
        <div class="skeleton-row"></div>
      </template>
    </div>

    <!-- ── Results Panel ─────────────────────────────────────── -->
    <section
      x-show="!loading && rows.length > 0"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-y-4"
      x-transition:enter-end="opacity-100 translate-y-0"
      class="bg-surface-1 border border-surface-2 rounded-xl overflow-hidden"
    >
      <!-- Results header bar -->
      <div class="flex flex-wrap items-center justify-between gap-3 px-5 py-4 border-b border-surface-2">
        <div class="flex items-center gap-3">
          <!-- Row count badge -->
          <span class="badge bg-indigo-900 text-indigo-300">
            <svg class="w-3 h-3 mr-1.5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
              <path fill-rule="evenodd"
                    d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z"
                    clip-rule="evenodd"/>
            </svg>
            <span x-text="rowCount + ' row' + (rowCount !== 1 ? 's' : '')"></span>
          </span>

          <!-- Markers badge -->
          <span
            x-show="hasMarkers"
            class="badge bg-emerald-900 text-emerald-300"
          >
            <svg class="w-3 h-3 mr-1.5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd"
                    d="M16.707 5.293a1 1 0 010 1.414L8.414 15 3.707 10.293a1 1 0 011.414-1.414L8.414 12.172l6.879-6.879a1 1 0 011.414 0z"
                    clip-rule="evenodd"/>
            </svg>
            KASP markers found
          </span>
          <span
            x-show="!hasMarkers && rows.length > 0"
            class="badge bg-slate-800 text-slate-400"
          >
            No KASP markers
          </span>
        </div>

        <!-- Download buttons -->
        <div class="flex items-center gap-2">
          <button
            @click="downloadCSV()"
            class="btn-outline flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs
                   text-slate-300 font-medium focus:outline-none focus:ring-2 focus:ring-accent-light"
          >
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            CSV
          </button>
          <button
            @click="downloadExcel()"
            class="btn-outline flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs
                   text-slate-300 font-medium focus:outline-none focus:ring-2 focus:ring-accent-light"
          >
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5l2 2h5a2 2 0 012 2v14a2 2 0 01-2 2z"/>
            </svg>
            Excel
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">
        <table class="results-table w-full text-sm">
          <thead>
            <tr>
              <template x-for="(col, idx) in columns" :key="col">
                <th
                  @click="sortBy(col)"
                  class="px-4 py-3 text-left text-xs font-semibold text-slate-400
                         uppercase tracking-wider whitespace-nowrap cursor-pointer select-none
                         hover:text-slate-200 transition-colors"
                >
                  <span class="flex items-center gap-1">
                    <span x-text="col.replace(/_/g, ' ')"></span>
                    <span
                      class="sort-icon"
                      :class="{ 'active': sortCol === col }"
                    >
                      <span x-show="sortCol !== col">⇅</span>
                      <span x-show="sortCol === col && sortAsc">↑</span>
                      <span x-show="sortCol === col && !sortAsc">↓</span>
                    </span>
                  </span>
                </th>
              </template>
            </tr>
          </thead>
          <tbody class="divide-y divide-surface-2">
            <template x-for="(row, rIdx) in pagedRows" :key="rIdx">
              <tr class="bg-surface-1 transition-colors">
                <template x-for="col in columns" :key="col">
                  <td class="px-4 py-2.5 text-slate-300">
                    <span
                      class="cell-truncate block"
                      :title="row[col] != null ? String(row[col]) : ''"
                      x-text="row[col] != null ? row[col] : '—'"
                    ></span>
                  </td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex flex-wrap items-center justify-between gap-3 px-5 py-3 border-t border-surface-2">
        <span class="text-xs text-slate-400">
          Page <span x-text="currentPage"></span> of <span x-text="totalPages"></span>
          &nbsp;·&nbsp; <span x-text="rows.length"></span> total rows
        </span>
        <div class="flex items-center gap-1">
          <!-- First -->
          <button
            @click="currentPage = 1"
            :disabled="currentPage === 1"
            class="btn-outline px-2 py-1 rounded text-xs text-slate-400 disabled:opacity-30 disabled:cursor-not-allowed"
          >«</button>
          <!-- Prev -->
          <button
            @click="currentPage--"
            :disabled="currentPage === 1"
            class="btn-outline px-2 py-1 rounded text-xs text-slate-400 disabled:opacity-30 disabled:cursor-not-allowed"
          >‹</button>
          <!-- Page numbers -->
          <template x-for="p in pageNumbers" :key="p">
            <button
              @click="currentPage = p"
              :class="p === currentPage
                ? 'bg-accent text-white border-accent'
                : 'btn-outline text-slate-400'"
              class="px-2.5 py-1 rounded text-xs font-medium border transition-colors"
              x-text="p"
            ></button>
          </template>
          <!-- Next -->
          <button
            @click="currentPage++"
            :disabled="currentPage === totalPages"
            class="btn-outline px-2 py-1 rounded text-xs text-slate-400 disabled:opacity-30 disabled:cursor-not-allowed"
          >›</button>
          <!-- Last -->
          <button
            @click="currentPage = totalPages"
            :disabled="currentPage === totalPages"
            class="btn-outline px-2 py-1 rounded text-xs text-slate-400 disabled:opacity-30 disabled:cursor-not-allowed"
          >»</button>
        </div>
      </div>
    </section>

    <!-- ── Empty state (after query, zero rows edge-case handled by error) ── -->

  </main>

  <!-- ═══════════════════════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════════════════════ -->
  <footer class="border-t border-surface-2 mt-12 py-5 text-center text-xs text-slate-600">
    Data sourced from
    <a href="https://plants.ensembl.org" target="_blank" rel="noopener"
       class="text-accent-light hover:underline">Ensembl Plants</a>
    via the EBI public MySQL server.
  </footer>

  <!-- ═══════════════════════════════════════════════════════════
       ALPINE.JS COMPONENT
  ═══════════════════════════════════════════════════════════ -->
  <script>
    function dashboardApp() {
      return {
        // ── Consequence type options (hardcoded allowed list) ────
        CONSEQUENCE_TYPES: [
          '3_prime_UTR_variant',
          '5_prime_UTR_variant',
          'downstream_gene_variant',
          'intron_variant',
          'missense_variant',
          'splice_acceptor_variant',
          'splice_donor_variant',
          'stop_gained',
          'synonymous_variant',
          'upstream_gene_variant',
        ],

        // ── Form inputs ─────────────────────────────────────────
        variantId:                '',
        transcriptId:             '',
        selectedConsequenceTypes: ['missense_variant'],
        consequenceDropdownOpen:  false,

        // ── UI state ────────────────────────────────────────────
        loading: false,
        error:   '',

        // ── Result state ────────────────────────────────────────
        token:      '',
        columns:    [],
        rows:       [],
        rowCount:   0,
        hasMarkers: false,
        dbName:     '',

        // ── Sorting state ───────────────────────────────────────
        sortCol: '',
        sortAsc: true,

        // ── Pagination state ────────────────────────────────────
        currentPage: 1,
        pageSize: 30,

        // ── Computed ────────────────────────────────────────────
        get consequenceLabel() {
          const n = this.selectedConsequenceTypes.length;
          if (n === 0) return 'Any type (no filter)';
          if (n === 1) return this.selectedConsequenceTypes[0].replace(/_/g, ' ');
          return `${n} types selected`;
        },

        get sortedRows() {
          if (!this.sortCol) return this.rows;
          const col = this.sortCol;
          const asc = this.sortAsc;
          return [...this.rows].sort((a, b) => {
            const va = a[col] ?? '';
            const vb = b[col] ?? '';
            if (va < vb) return asc ? -1 : 1;
            if (va > vb) return asc ? 1 : -1;
            return 0;
          });
        },

        get totalPages() {
          return Math.max(1, Math.ceil(this.rows.length / this.pageSize));
        },

        get pagedRows() {
          const start = (this.currentPage - 1) * this.pageSize;
          return this.sortedRows.slice(start, start + this.pageSize);
        },

        get pageNumbers() {
          const total = this.totalPages;
          const current = this.currentPage;
          const delta = 2;
          const pages = [];
          for (let i = Math.max(1, current - delta); i <= Math.min(total, current + delta); i++) {
            pages.push(i);
          }
          return pages;
        },

        // ── Methods ─────────────────────────────────────────────
        async submitQuery() {
          this.consequenceDropdownOpen = false;
          this.error   = '';
          this.rows    = [];
          this.columns = [];
          this.token   = '';
          this.sortCol = '';

          if (!this.variantId.trim() && !this.transcriptId.trim()) {
            this.error = 'Please enter at least one search parameter.';
            return;
          }

          this.currentPage = 1;
          this.loading = true;
          try {
            const res = await fetch('/api/query', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                variant_id:        this.variantId.trim()                    || null,
                transcript_id:     this.transcriptId.trim()                 || null,
                consequence_types: this.selectedConsequenceTypes.length > 0
                                     ? this.selectedConsequenceTypes
                                     : null,
              }),
            });

            const data = await res.json();

            if (!res.ok) {
              this.error = data.error ?? data.detail?.error ?? 'An unexpected error occurred.';
              return;
            }

            this.token      = data.token;
            this.columns    = data.columns;
            this.rows       = data.rows;
            this.rowCount   = data.row_count;
            this.hasMarkers = data.has_markers;
            this.dbName     = data.db_name;

          } catch (err) {
            this.error = 'Network error — could not reach the server. Please try again.';
          } finally {
            this.loading = false;
          }
        },

        sortBy(col) {
          if (this.sortCol === col) {
            this.sortAsc = !this.sortAsc;
          } else {
            this.sortCol = col;
            this.sortAsc = true;
          }
          this.currentPage = 1;
        },

        downloadCSV() {
          if (!this.token) return;
          window.location.href = `/api/download/csv/${this.token}`;
        },

        downloadExcel() {
          if (!this.token) return;
          window.location.href = `/api/download/excel/${this.token}`;
        },

        resetState() {
          this.variantId                = '';
          this.transcriptId             = '';
          this.selectedConsequenceTypes = ['missense_variant'];
          this.consequenceDropdownOpen  = false;
          this.error                    = '';
          this.rows                     = [];
          this.columns                  = [];
          this.token                    = '';
          this.rowCount                 = 0;
          this.hasMarkers               = false;
          this.sortCol                  = '';
          this.currentPage              = 1;
        },
      };
    }
  </script>

</body>
</html>
